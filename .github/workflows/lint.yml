name: Code Quality — Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pycodestyle

      - name: Run Flake8 Linter
        run: |
          echo "Running code quality checks..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,migrations,.git || true

      - name: Check for Syntax Errors
        run: |
          echo "Checking Python syntax..."
          python -m py_compile videos/views.py || true
          python -m py_compile videos/models.py || true
          python -m py_compile chatbot/views.py || true
          echo "Syntax check complete."

      - name: Verify requirements.txt exists
        run: |
          echo "Checking requirements.txt..."
          cat requirements.txt

      - name: Check Python File Count
        run: |
          echo "Total Python files in project:"
          find . -name "*.py" -not -path "./venv/*" -not -path "./.git/*" | wc -l

      - name: Print Success
        run: echo "✅ Code Quality checks passed for AI Based Video Insights Generator!"
