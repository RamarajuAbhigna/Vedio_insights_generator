name: AI Based Video Insight Generator CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Print Project Files
        run: ls

      - name: Check Python Version
        run: python --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          

      - name: Run Linter
        run: |
          pip install flake8
          flake8 .

      - name: Print Success Message
        run: echo "AI Based Video Insight Generator CI successful!"
