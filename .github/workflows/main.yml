name: AI Based Vedio Insight Generator CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Print Project Files
      run: ls

    - name: Test Python
      run: python --version

    - name: Print Success Message
      run: echo "AI Based Vedio Insight Generator CI successful!"
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
       python-version: "3.10"
    - name: Install dependencies
      run: |
       python -m pip install --upgrade pip
       pip install -r requirements.txt
    - name: Run Linter
      run: |
       pip install flake8
       flake8 .
